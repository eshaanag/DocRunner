name: DocRunner
description: Test README code examples and optionally post pull request comments.
inputs:
  github-token:
    description: Token used to create or update a pull request comment.
    required: false
  anthropic-api-key:
    description: Optional Claude API key for fix suggestions.
    required: false
  config:
    description: Path to docrunner.yml.
    required: false
    default: docrunner.yml
  leaderboard-secret:
    description: Optional secret for opt-in leaderboard writes.
    required: false
outputs:
  summary:
    description: Human-readable result summary.
  json:
    description: Machine-readable DocRunner results.
runs:
  using: docker
  image: Dockerfile
